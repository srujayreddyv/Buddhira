name: CI Gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon
        run: npm run build

  backend-smoke:
    name: Backend Smoke
    runs-on: ubuntu-latest
    needs: frontend-build
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    defaults:
      run:
        working-directory: backend
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
      SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
      BACKEND_URL: http://127.0.0.1:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate required secrets
        id: secret_check
        run: |
          set -euo pipefail
          missing=0
          for key in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY SUPABASE_ANON_KEY SMOKE_TEST_EMAIL SMOKE_TEST_PASSWORD; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce smoke secrets on main
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.secret_check.outputs.ready != 'true' }}
        run: |
          echo "Smoke test secrets are required for pushes to main."
          exit 1

      - name: Skip smoke for missing secrets on PR
        if: ${{ github.event_name == 'pull_request' && steps.secret_check.outputs.ready != 'true' }}
        run: echo "Skipping backend smoke on PR because required secrets are not configured."

      - name: Install dependencies
        if: ${{ steps.secret_check.outputs.ready == 'true' }}
        run: pip install -r requirements.txt

      - name: Start backend
        if: ${{ steps.secret_check.outputs.ready == 'true' }}
        run: |
          nohup uvicorn main:app --host 127.0.0.1 --port 8000 >/tmp/buddhira-backend.log 2>&1 &
          echo $! >/tmp/buddhira-backend.pid

      - name: Wait for health
        if: ${{ steps.secret_check.outputs.ready == 'true' }}
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if curl -fsS "$BACKEND_URL/health" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become healthy in time"
          exit 1

      - name: Run smoke test
        if: ${{ steps.secret_check.outputs.ready == 'true' }}
        run: python smoke_test.py

      - name: Backend logs on failure
        if: failure()
        run: |
          if [ -f /tmp/buddhira-backend.log ]; then
            cat /tmp/buddhira-backend.log
          fi

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/buddhira-backend.pid ]; then
            kill "$(cat /tmp/buddhira-backend.pid)" || true
          fi
